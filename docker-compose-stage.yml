volumes:
  pg_data:
  static_data:
  minio_data:

networks:
  leaf-shared-network:
    external: true

services:
  db-leaf-flow-stage:
    image: postgres:17
    container_name: db-leaf-flow-stage
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5455:5432"
    restart: always
    networks:
      - leaf-shared-network

  leaf-flow-stage:
    image: mist3s/leaf-flow:stage
    container_name: leaf-flow-stage
    restart: always
    env_file: .env
    volumes:
      - static_data:/app/static
    environment:
      - STATIC_FILES_PATH=/app/static
    depends_on:
      - db-leaf-flow-stage
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - leaf-shared-network

  leaf-flow-bot-stage:
    image: mist3s/leaf-flow-bot:stage
    container_name: leaf-flow-bot-stage
    restart: always
    env_file: .env
    volumes:
      - static_data:/app/static
    environment:
      - STATIC_FILES_PATH=/app/static
    depends_on:
      - leaf-flow-stage
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - leaf-shared-network

  leaf-flow-nginx-stage:
    image: mist3s/leaf-flow-nginx:stage
    container_name: leaf-flow-nginx-stage
    ports:
      - "5015:80"
    depends_on:
      - leaf-flow-stage
    volumes:
      - static_data:/app/static
    env_file: .env
    restart: always
    networks:
      - leaf-shared-network

  leaf-flow-web-nginx-stage:
    image: mist3s/leaf-flow-web-nginx:stage
    container_name: leaf-flow-web-nginx-stage
    ports:
      - "5026:80"
    restart: always
    networks:
      - leaf-shared-network

  leaf-flow-admin-nginx-stage:
    image: mist3s/leaf-flow-admin-nginx:stage
    container_name: leaf-flow-admin-nginx-stage
    ports:
      - "5028:80"
    restart: always
    networks:
      - leaf-shared-network

  redis:
    image: redis:7-alpine
    container_name: delivery_geo_redis
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - leaf-shared-network

  leaf-flow-notifications-worker-stage:
    image: mist3s/leaf-flow-notifications-worker:stage
    container_name: leaf-flow-notifications-worker-stage
    restart: always
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - leaf-shared-network

  leaf-flow-outbox-worker-stage:
    image: mist3s/leaf-flow:stage
    container_name: leaf-flow-outbox-worker-stage
    restart: always
    env_file: .env
    command: ["python", "-m", "leaf_flow.outbox_worker"]
    depends_on:
      - db-leaf-flow-stage
    networks:
      - leaf-shared-network
    deploy:
      resources:
        limits:
          memory: 256M

  minio-server-stage:
    image: quay.io/minio/aistor/minio:latest
    container_name: minio-server-stage
    env_file: .env
    command:
      - minio
      - server
      - /mnt/data
      - --license
      - /minio.license
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/mnt/data
      - ./.minio/minio.license:/minio.license:ro
    restart: always
    networks:
      - leaf-shared-network
